arch: amd64
cores: 1
features: nesting=1
hostname: lxc-Tailscale
memory: 512
net0: name=eth0,bridge=vmbr0,firewall=1,gw=192.168.10.1,hwaddr=BC:24:11:2A:A1:06,ip=192.168.10.40/24,type=veth
