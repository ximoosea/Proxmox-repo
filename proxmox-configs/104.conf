#<div align='center'>
#  <a href='https%3A//docs.scrypted.app'>
#    <img src='https%3A//github.com/koush/scrypted/blob/main/install/proxmox/lxc.png?raw=true'/>
#  </a>
#
#  # Scrypted
#
#  <div><a href='https%3A//scrypted%3A10443/'>Management Console</a></div>
#  <div><a href='https%3A//docs.scrypted.app'>Docs</a></div>
#
#  <br/>
#  <div>Container root password%3A scrypted</div>
#</div>
arch: amd64
cores: 4
features: nesting=1
hostname: lxc-scrypted
memory: 4096
mp0: symes1-storage:104/vm-104-disk-0.raw,mp=/root/.scrypted/volume,backup=1,mountoptions=noatime,size=48G
net0: name=eth0,bridge=vmbr0,gw=192.168.20.1,hwaddr=BC:24:11:D6:01:60,ip=192.168.20.50/24,ip6=auto,tag=20,type=veth
onboot: 1
ostype: ubuntu
rootfs: symes1-storage:104/vm-104-disk-1.raw,mountoptions=noatime,size=48G
swap: 4096
unprivileged: 1
lxc.mount.entry: /dev/kfd dev/kfd none bind,optional,create=file
lxc.mount.entry: /dev/dri dev/dri none bind,optional,create=dir
lxc.mount.entry: /dev/accel dev/accel none bind,optional,create=dir
lxc.mount.entry: /dev/apex_0 dev/apex_0 none bind,optional,create=file
lxc.mount.entry: /dev/apex_1 dev/apex_1 none bind,optional,create=file
lxc.mount.entry: /dev/bus/usb dev/bus/usb none bind,optional,create=dir
