# uid map%3A from uid 0 map 1005 uids (in the ct) to the range starting 100000 (on the host), so 0..1004 (ct) %E2%86%92 100000..101004 (host)
#mp0%3A /mnt/pve/symes1-storage/torrents/,mp=/torrents,shared=1
arch: amd64
cores: 2
features: keyctl=1,nesting=1
hostname: qbittorrent
memory: 2048
mp0: /mnt/pve/symes1-storage/torrents/,mp=/mnt/torrents,shared=1
net0: name=eth0,bridge=vmbr0,hwaddr=BC:24:11:32:AD:B2,ip=dhcp,tag=30,type=veth
onboot: 0
ostype: debian
rootfs: symes1-storage:106/vm-106-disk-0.raw,size=8G
swap: 512
tags: community-script;vlan30_IoT
unprivileged: 1
unused0: symes1-storage:106/vm-106-disk-1.raw
lxc.idmap: u 0 100000 65536
lxc.idmap: g 0 100000 65536
